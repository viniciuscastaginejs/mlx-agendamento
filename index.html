<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mlx organização</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0b1a;
    --bg2: #150f27;
    --bg3: #1c1535;
    --card: #1e1638;
    --card2: #261d47;
    --border: rgba(139, 92, 246, 0.18);
    --border2: rgba(139, 92, 246, 0.35);
    --purple: #8b5cf6;
    --purple2: #a78bfa;
    --purple3: #c4b5fd;
    --purple-dim: rgba(139, 92, 246, 0.12);
    --purple-glow: rgba(139, 92, 246, 0.25);
    --text: #f0eaff;
    --text2: #a89ec4;
    --text3: #6b608a;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--purple);
    font-family: var(--mono);
  }

  .logo span { color: var(--text3); }

  .header-date {
    text-align: right;
  }

  .header-date .day {
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    letter-spacing: -2px;
  }

  .header-date .month {
    font-size: 13px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* ── Stats bar ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }

  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
    opacity: 0.5;
  }

  .stat-val {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    font-family: var(--mono);
  }

  .stat-val.green { color: var(--green); }
  .stat-val.purple { color: var(--purple2); }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.08em;
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 28px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-header span {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .progress-header .pct {
    color: var(--purple2);
    font-weight: 500;
  }

  .progress-track {
    height: 3px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--purple3));
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Add task form ── */
  .add-form {
    background: var(--card);
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
  }

  .add-form input[type="text"],
  .add-form input[type="time"] {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: var(--display);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form input[type="text"]::placeholder { color: var(--text3); }

  .add-form input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
  }

  .add-form input[type="time"] {
    font-family: var(--mono);
    font-size: 13px;
    width: 110px;
    color: var(--purple2);
  }

  .tag-select {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text2);
    outline: none;
    cursor: pointer;
  }

  .btn-add {
    background: var(--purple);
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--display);
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .btn-add:hover {
    background: var(--purple2);
    transform: translateY(-1px);
  }

  .btn-add:active { transform: scale(0.97); }

  .add-form-row2 {
    grid-column: 1 / -1;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* ── Section header ── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .section-label span {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  /* ── Task list ── */
  #task-list { margin-bottom: 32px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 7px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2.5px;
    background: var(--purple);
    opacity: 0;
    transition: opacity 0.18s;
    border-radius: 2px 0 0 2px;
  }

  .task-item:hover { border-color: var(--border2); background: var(--card2); }
  .task-item:hover::before { opacity: 0.6; }

  .task-item.done {
    opacity: 0.55;
  }

  .task-item.done::before {
    opacity: 1;
    background: var(--green);
  }

  .check-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    font-size: 11px;
    color: transparent;
  }

  .task-item.done .check-circle {
    background: var(--green);
    border-color: var(--green);
    color: #0e0b1a;
    font-size: 12px;
  }

  .task-time {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--purple2);
    min-width: 44px;
    flex-shrink: 0;
  }

  .task-text {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
    line-height: 1.4;
    transition: color 0.18s;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--text3);
  }

  .task-tag {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.07em;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }

  .tag-work    { background: rgba(139,92,246,0.18); color: var(--purple3); }
  .tag-pessoal { background: rgba(167,139,250,0.12); color: var(--purple2); }
  .tag-faculdade { background: rgba(52,211,153,0.12); color: #6ee7b7; }
  .tag-saude   { background: rgba(251,191,36,0.12); color: #fde68a; }
  .tag-outro   { background: rgba(248,113,113,0.1); color: #fca5a5; }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.15s;
  }

  .task-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text3);
    font-size: 14px;
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }

  .empty span {
    display: block;
    font-size: 32px;
    margin-bottom: 10px;
    opacity: 0.3;
  }

  /* ── Time blocks section ── */
  .timeline { position: relative; }

  .timeline-item {
    display: flex;
    gap: 16px;
    margin-bottom: 4px;
    align-items: stretch;
  }

  .tl-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    width: 42px;
    flex-shrink: 0;
    padding-top: 14px;
    text-align: right;
    letter-spacing: 0.04em;
  }

  .tl-line {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 20px;
    flex-shrink: 0;
  }

  .tl-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border2);
    margin-top: 17px;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .tl-connector {
    flex: 1;
    width: 1px;
    background: var(--border);
    min-height: 8px;
  }

  .tl-card {
    flex: 1;
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .tl-card:hover { border-color: var(--border2); background: var(--card2); }

  .tl-card.done { opacity: 0.45; }

  .tl-card .tl-title {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
  }

  .tl-card.done .tl-title {
    text-decoration: line-through;
    color: var(--text3);
  }

  .tl-card .tl-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 3px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .tl-dot.has-task { background: var(--purple); box-shadow: 0 0 6px var(--purple-glow); }
  .tl-dot.done-task { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.3); }

  /* ── View toggle ── */
  .view-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .view-btn {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.18s;
  }

  .view-btn.active {
    background: var(--purple-dim);
    border-color: var(--purple);
    color: var(--purple2);
  }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    text-align: center;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">mlx<span> /</span> organização</div>
    </div>
    <div class="header-date">
      <div class="day" id="hdr-day"></div>
      <div class="month" id="hdr-month"></div>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-val purple" id="stat-total">0</div>
      <div class="stat-label">tarefas</div>
    </div>
    <div class="stat">
      <div class="stat-val green" id="stat-done">0</div>
      <div class="stat-label">concluídas</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="stat-pct" style="color:var(--text2)">0%</div>
      <div class="stat-label">progresso</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-header">
      <span>progresso do dia</span>
      <span class="pct" id="pct-label">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="add-form">
    <input type="text" id="input-task" placeholder="Adicionar tarefa..." />
    <input type="time" id="input-time" />
    <select class="tag-select" id="input-tag">
      <option value="work">work</option>
      <option value="pessoal">pessoal</option>
      <option value="faculdade">faculdade</option>
      <option value="saude">saúde</option>
      <option value="outro">outro</option>
    </select>
    <button class="btn-add" onclick="addTask()">+ add</button>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('list')" id="btn-list">lista</button>
    <button class="view-btn" onclick="setView('timeline')" id="btn-timeline">timeline</button>
  </div>

  <div class="section-label"><span>tarefas de hoje</span></div>

  <div id="task-list"></div>
  <div id="timeline-view" style="display:none"></div>

  <div class="footer">mlx organização — feito pra você 🖤</div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('mlx-tasks') || '[]');
  let nextId = parseInt(localStorage.getItem('mlx-nextid') || '1');
  let view = 'list';

  function save() {
    localStorage.setItem('mlx-tasks', JSON.stringify(tasks));
    localStorage.setItem('mlx-nextid', nextId);
  }

  function setView(v) {
    view = v;
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    document.getElementById('btn-timeline').classList.toggle('active', v === 'timeline');
    document.getElementById('task-list').style.display = v === 'list' ? 'block' : 'none';
    document.getElementById('timeline-view').style.display = v === 'timeline' ? 'block' : 'none';
    render();
  }

  function addTask() {
    const text = document.getElementById('input-task').value.trim();
    if (!text) return;
    const time = document.getElementById('input-time').value;
    const tag = document.getElementById('input-tag').value;
    tasks.push({ id: nextId++, text, time, tag, done: false });
    tasks.sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'));
    document.getElementById('input-task').value = '';
    save();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function render() {
    updateStats();
    if (view === 'list') renderList();
    else renderTimeline();
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pct').textContent = pct + '%';
    document.getElementById('pct-label').textContent = pct + '%';
    document.getElementById('prog-fill').style.width = pct + '%';
  }

  function renderList() {
    const list = document.getElementById('task-list');
    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty"><span>◎</span>nenhuma tarefa ainda.<br>adicione algo acima.</div>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-item${t.done ? ' done' : ''}" onclick="toggleTask(${t.id})">
        <div class="check-circle">${t.done ? '✓' : ''}</div>
        ${t.time ? `<div class="task-time">${t.time}</div>` : ''}
        <div class="task-text">${escape(t.text)}</div>
        <span class="task-tag tag-${t.tag}">${t.tag}</span>
        <button class="del-btn" onclick="event.stopPropagation();deleteTask(${t.id})" title="remover">×</button>
      </div>
    `).join('');
  }

  function renderTimeline() {
    const tl = document.getElementById('timeline-view');
    if (tasks.length === 0) {
      tl.innerHTML = '<div class="empty"><span>◎</span>nenhuma tarefa ainda.</div>';
      return;
    }
    const withTime = tasks.filter(t => t.time);
    const noTime = tasks.filter(t => !t.time);
    let html = '';

    withTime.forEach((t, i) => {
      const isLast = i === withTime.length - 1 && noTime.length === 0;
      html += `
        <div class="timeline-item">
          <div class="tl-time">${t.time}</div>
          <div class="tl-line">
            <div class="tl-dot ${t.done ? 'done-task' : 'has-task'}"></div>
            ${!isLast ? '<div class="tl-connector"></div>' : ''}
          </div>
          <div class="tl-card${t.done ? ' done' : ''}" onclick="toggleTask(${t.id})">
            <div class="tl-title">${escape(t.text)}</div>
            <div class="tl-tag">${t.tag}</div>
          </div>
        </div>
      `;
    });

    if (noTime.length > 0) {
      html += `
        <div style="font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 10px 58px;">sem horário</div>
      `;
      noTime.forEach(t => {
        html += `
          <div class="timeline-item">
            <div class="tl-time">—</div>
            <div class="tl-line">
              <div class="tl-dot ${t.done ? 'done-task' : ''}"></div>
            </div>
            <div class="tl-card${t.done ? ' done' : ''}" onclick="toggleTask(${t.id})">
              <div class="tl-title">${escape(t.text)}</div>
              <div class="tl-tag">${t.tag}</div>
            </div>
          </div>
        `;
      });
    }

    tl.innerHTML = html;
  }

  function escape(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Set header date
  const now = new Date();
  document.getElementById('hdr-day').textContent = String(now.getDate()).padStart(2,'0');
  document.getElementById('hdr-month').textContent = now.toLocaleDateString('pt-BR', { weekday: 'long', month: 'long', year: 'numeric' });

  // Pre-load the task from the user's note
  if (tasks.length === 0) {
    tasks.push({ id: nextId++, text: 'Terminar site dantas', time: '', tag: 'work', done: false });
    save();
  }

  render();

  document.getElementById('input-task').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
</script>
</body>
</html>
