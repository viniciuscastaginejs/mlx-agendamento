<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLX Mind — Agendamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-900: #26215C; --purple-800: #3C3489; --purple-600: #534AB7;
      --purple-400: #7F77DD; --purple-200: #AFA9EC; --purple-100: #CECBF6;
      --bg: #0f0d2a; --surface: #1a1640; --surface2: #231e52;
      --text: #f0eeff; --muted: #9990cc; --border: rgba(175,169,236,0.15);
      --green: #1D9E75; --green-bg: rgba(29,158,117,0.15); --green-text: #5DCAA5;
    }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { min-height: 100vh; position: relative; }

    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .header, .content { position: relative; z-index: 1; }

    /* HEADER */
    .header { background: rgba(26,22,64,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; color: var(--purple-100); letter-spacing: -0.5px; }
    .logo span { color: var(--purple-400); }
    .nav { display: flex; gap: 4px; }
    .nav-btn { background: transparent; border: none; padding: 7px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { background: var(--purple-800); color: var(--purple-100); }
    .nav-btn:hover:not(.active) { background: rgba(127,119,221,0.12); color: var(--text); }

    /* CONTENT */
    .content { padding: 32px 24px; max-width: 720px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }

    .section-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 600; color: var(--purple-100); margin-bottom: 6px; }
    .section-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

    /* CARDS / FORM */
    .form-card { background: rgba(26,22,64,0.7); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--purple-400); }
    .form-input::placeholder { color: var(--muted); }
    select.form-input option { background: #231e52; }

    .type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .type-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .type-card:hover { border-color: var(--purple-400); background: rgba(127,119,221,0.08); }
    .type-card.selected { border-color: var(--purple-400); background: rgba(127,119,221,0.15); }
    .type-icon { font-size: 24px; margin-bottom: 6px; display: block; }
    .type-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .type-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    .btn-primary { width: 100%; background: var(--purple-600); border: none; border-radius: 10px; padding: 13px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: white; cursor: pointer; margin-top: 8px; transition: background 0.2s; letter-spacing: 0.3px; }
    .btn-primary:hover { background: var(--purple-800); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.green { background: #0F6E56; }
    .btn-primary.green:hover { background: #085041; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: rgba(26,22,64,0.7); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--purple-400); }
    .stat-val.green { color: var(--green-text); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* SECTION HEADER */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .filter-btn.active { background: var(--purple-800); border-color: var(--purple-600); color: var(--purple-100); }

    /* MEETING LIST */
    .item-list { display: flex; flex-direction: column; gap: 10px; }
    .meeting-item { background: rgba(26,22,64,0.7); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .meeting-item.past { opacity: 0.4; border-style: dashed; }

    .meeting-badge { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .badge-call { background: rgba(127,119,221,0.2); }
    .badge-meet { background: rgba(29,158,117,0.2); }
    .badge-deal { background: rgba(29,158,117,0.2); }

    .meeting-info { flex: 1; min-width: 0; }
    .meeting-name { font-weight: 500; font-size: 14px; color: var(--text); }
    .meeting-meta { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; display: inline-block; margin-top: 5px; }
    .pill-ligacao { background: rgba(127,119,221,0.15); color: var(--purple-200); }
    .pill-meet    { background: rgba(29,158,117,0.15); color: #5DCAA5; }
    .pill-deal    { background: rgba(29,158,117,0.15); color: #5DCAA5; }

    .meeting-date { text-align: right; flex-shrink: 0; }
    .date-day  { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--purple-400); line-height: 1; }
    .date-rest { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .deal-val  { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--green-text); white-space: nowrap; }

    .del-btn { background: transparent; border: none; width: 28px; height: 28px; border-radius: 6px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
    .del-btn:hover { background: rgba(226,75,74,0.15); color: #E24B4A; }

    .past-label { font-size: 11px; color: var(--muted); font-style: italic; padding: 6px 0; border-top: 1px solid var(--border); text-align: center; margin-top: 6px; }
    .tag-past   { font-size: 10px; padding: 2px 8px; background: rgba(136,135,128,0.2); color: var(--muted); border-radius: 20px; margin-left: 6px; }

    .empty-state   { text-align: center; padding: 56px 24px; color: var(--muted); font-size: 14px; line-height: 1.8; }
    .loading-state { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    /* FECHAMENTOS — painel de períodos */
    .period-tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .period-tab { background: var(--surface2); border: 1px solid var(--border); padding: 7px 16px; border-radius: 20px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .period-tab.active { background: var(--purple-800); border-color: var(--purple-600); color: var(--purple-100); font-weight: 500; }

    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .service-card { background: rgba(26,22,64,0.7); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; }
    .service-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .service-count { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; color: var(--purple-400); line-height: 1; }
    .service-total { font-size: 12px; color: var(--green-text); margin-top: 4px; }

    .grand-total-card { background: rgba(15,110,86,0.12); border: 1px solid rgba(29,158,117,0.25); border-radius: 14px; padding: 20px 24px; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between; }
    .grand-total-label { font-size: 13px; color: var(--green-text); font-weight: 500; }
    .grand-total-val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--green-text); }

    /* TOAST */
    .toast { position: fixed; top: 20px; right: 20px; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; display: none; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .toast.success { background: var(--purple-800); color: var(--purple-100); border: 1px solid var(--purple-600); }
    .toast.error   { background: #3d1515; color: #f09595; border: 1px solid #a32d2d; }

    @media (max-width: 520px) {
      .content { padding: 20px 14px; }
      .row2 { grid-template-columns: 1fr; }
      .row3 { grid-template-columns: 1fr 1fr; }
      .stat-val { font-size: 22px; }
      .header { padding: 12px 14px; }
      .nav-btn { padding: 6px 10px; font-size: 12px; }
      .services-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app">
  <div class="toast" id="toast"></div>

  <div class="header">
    <div class="logo">MLX <span>MIND</span></div>
    <div class="nav">
      <button class="nav-btn active" onclick="setView('form')">Agendar</button>
      <button class="nav-btn" onclick="setView('list')">Reuniões</button>
      <button class="nav-btn" onclick="setView('deals')">Fechamentos</button>
    </div>
  </div>

  <div class="content">

    <!-- ===== ABA: AGENDAR ===== -->
    <div class="view active" id="formView">
      <div class="section-title">Nova reunião</div>
      <div class="section-sub">Preencha os dados abaixo para agendar</div>
      <div class="form-card">
        <div class="form-group">
          <label class="form-label">Tipo de reunião</label>
          <div class="type-row">
            <div class="type-card selected" id="tc-ligacao" onclick="selectType('ligacao')">
              <span class="type-icon">📞</span>
              <div class="type-name">Ligação</div>
              <div class="type-desc">Chamada por telefone</div>
            </div>
            <div class="type-card" id="tc-meet" onclick="selectType('meet')">
              <span class="type-icon">🎥</span>
              <div class="type-name">Google Meet</div>
              <div class="type-desc">Reunião por vídeo</div>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nome do cliente / contato *</label>
          <input class="form-input" id="fName" type="text" placeholder="Ex: João Silva">
        </div>
        <div class="row2">
          <div class="form-group">
            <label class="form-label">Telefone *</label>
            <input class="form-input" id="fPhone" type="tel" placeholder="(11) 99999-9999">
          </div>
          <div class="form-group">
            <label class="form-label">E-mail (opcional)</label>
            <input class="form-input" id="fEmail" type="email" placeholder="email@exemplo.com">
          </div>
        </div>
        <div class="row2">
          <div class="form-group">
            <label class="form-label">Data *</label>
            <input class="form-input" id="fDate" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Horário *</label>
            <input class="form-input" id="fTime" type="time">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Observações (opcional)</label>
          <input class="form-input" id="fObs" type="text" placeholder="Ex: Apresentar proposta de tráfego pago">
        </div>
        <button class="btn-primary" id="btnSave" onclick="saveMeeting()">Confirmar agendamento</button>
      </div>
    </div>

    <!-- ===== ABA: REUNIÕES ===== -->
    <div class="view" id="listView">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="statTotal">—</div><div class="stat-label">Total agendado</div></div>
        <div class="stat-card"><div class="stat-val" id="statProx">—</div><div class="stat-label">Próximas</div></div>
        <div class="stat-card"><div class="stat-val" id="statToday">—</div><div class="stat-label">Hoje</div></div>
      </div>
      <div class="section-header">
        <div class="section-title" style="margin-bottom:0;">Agenda</div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setMeetFilter('todas',this)">Todas</button>
          <button class="filter-btn" onclick="setMeetFilter('ligacao',this)">Ligação</button>
          <button class="filter-btn" onclick="setMeetFilter('meet',this)">Meet</button>
        </div>
      </div>
      <div class="item-list" id="meetingList"><div class="loading-state">Carregando...</div></div>
    </div>

    <!-- ===== ABA: FECHAMENTOS ===== -->
    <div class="view" id="dealsView">
      <div class="section-title">Novo fechamento</div>
      <div class="section-sub">Registre um negócio fechado</div>
      <div class="form-card" style="margin-bottom:32px;">
        <div class="row2">
          <div class="form-group">
            <label class="form-label">Cliente *</label>
            <input class="form-input" id="dClient" type="text" placeholder="Ex: João Silva">
          </div>
          <div class="form-group">
            <label class="form-label">Serviço *</label>
            <select class="form-input" id="dService">
              <option value="">Selecione...</option>
              <option value="Landing Page">Landing Page</option>
              <option value="Tráfego Pago">Tráfego Pago</option>
              <option value="Gestão de Redes">Gestão de Redes</option>
              <option value="Chatbot">Chatbot</option>
              <option value="SDR / Prospecção">SDR / Prospecção</option>
              <option value="Site Completo">Site Completo</option>
              <option value="Consultoria">Consultoria</option>
              <option value="Pacote Completo">Pacote Completo</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
        </div>
        <div class="row2">
          <div class="form-group">
            <label class="form-label">Valor (R$) *</label>
            <input class="form-input" id="dValue" type="number" min="0" step="0.01" placeholder="Ex: 1500">
          </div>
          <div class="form-group">
            <label class="form-label">Data do fechamento *</label>
            <input class="form-input" id="dDate" type="date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Observações (opcional)</label>
          <input class="form-input" id="dObs" type="text" placeholder="Ex: Recorrência mensal, contrato 3 meses">
        </div>
        <button class="btn-primary green" id="btnDeal" onclick="saveDeal()">Registrar fechamento</button>
      </div>

      <!-- PAINEL DE TOTAIS -->
      <div class="section-title" style="margin-bottom:16px;">Painel de resultados</div>
      <div class="period-tabs">
        <button class="period-tab active" onclick="setPeriod(0,this)">Hoje</button>
        <button class="period-tab" onclick="setPeriod(1,this)">Ontem</button>
        <button class="period-tab" onclick="setPeriod(7,this)">7 dias</button>
        <button class="period-tab" onclick="setPeriod(30,this)">30 dias</button>
        <button class="period-tab" onclick="setPeriod(90,this)">90 dias</button>
      </div>

      <div class="grand-total-card">
        <div>
          <div class="grand-total-label" id="periodLabel">Hoje</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="periodCount">0 fechamentos</div>
        </div>
        <div class="grand-total-val" id="grandTotal">R$ 0,00</div>
      </div>

      <div class="services-grid" id="servicesGrid"></div>

      <div class="section-header" style="margin-top:8px;">
        <div class="section-title" style="margin-bottom:0;font-size:16px;">Histórico</div>
        <button class="filter-btn" style="font-size:11px;" onclick="loadDeals()">↺ Atualizar</button>
      </div>
      <div class="item-list" id="dealsList"><div class="loading-state">Carregando...</div></div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://txclxnfrqzcdxqfqygeq.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4Y2x4bmZycXpjZHhxZnF5Z2VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjgwMzUsImV4cCI6MjA5MTE0NDAzNX0.fycGOcFseNKBz7OVfsbumk5mWzxF09Xb2YWEn3iDmRE';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let meetings = [];
  let deals = [];
  let selectedType = 'ligacao';
  let meetFilter = 'todas';
  let currentPeriodDays = 0;

  const todayStr = new Date().toISOString().split('T')[0];
  document.getElementById('fDate').value = todayStr;
  document.getElementById('fDate').min  = todayStr;
  document.getElementById('fTime').value = '09:00';
  document.getElementById('dDate').value = todayStr;

  /* ---- UTILS ---- */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
  }

  function fmtBRL(v) {
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function dateInPeriod(dateStr, days) {
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (days === 0) { // hoje
      return d >= todayStart;
    }
    if (days === 1) { // ontem
      const yest = new Date(todayStart); yest.setDate(yest.getDate() - 1);
      return d >= yest && d < todayStart;
    }
    const from = new Date(todayStart); from.setDate(from.getDate() - (days - 1));
    return d >= from;
  }

  /* ---- NAVEGAÇÃO ---- */
  function setView(v) {
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(v + 'View').classList.add('active');
    const idx = ['form','list','deals'].indexOf(v);
    document.querySelectorAll('.nav-btn')[idx].classList.add('active');
    if (v === 'list') loadMeetings();
    if (v === 'deals') loadDeals();
  }

  /* ---- REUNIÕES ---- */
  function selectType(t) {
    selectedType = t;
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('tc-' + t).classList.add('selected');
  }

  async function loadMeetings() {
    document.getElementById('meetingList').innerHTML = '<div class="loading-state">Carregando...</div>';
    const { data, error } = await sb.from('reunioes').select('*').order('date').order('time');
    if (error) { showToast('Erro ao carregar reuniões.', 'error'); return; }
    meetings = data || [];
    renderMeetings();
  }

  async function saveMeeting() {
    const name  = document.getElementById('fName').value.trim();
    const phone = document.getElementById('fPhone').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    const date  = document.getElementById('fDate').value;
    const time  = document.getElementById('fTime').value;
    const obs   = document.getElementById('fObs').value.trim();
    if (!name)  { showToast('Informe o nome.', 'error'); return; }
    if (!phone) { showToast('Informe o telefone.', 'error'); return; }
    if (!date || !time) { showToast('Informe data e horário.', 'error'); return; }
    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = 'Salvando...';
    const { error } = await sb.from('reunioes').insert([{ type: selectedType, name, phone, email: email||null, date, time, obs: obs||null }]);
    btn.disabled = false; btn.textContent = 'Confirmar agendamento';
    if (error) { showToast('Erro ao salvar.', 'error'); return; }
    ['fName','fPhone','fEmail','fObs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fDate').value = todayStr;
    document.getElementById('fTime').value = '09:00';
    showToast('✓ Reunião agendada!');
    setView('list');
  }

  async function deleteMeeting(id) {
    if (!confirm('Remover esta reunião?')) return;
    const { error } = await sb.from('reunioes').delete().eq('id', id);
    if (error) { showToast('Erro ao remover.', 'error'); return; }
    meetings = meetings.filter(m => m.id !== id);
    renderMeetings();
  }

  function setMeetFilter(f, el) {
    meetFilter = f;
    document.querySelectorAll('#listView .filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderMeetings();
  }

  function isPast(m) { return new Date(m.date + 'T' + m.time) < new Date(); }
  function isToday(m) { return m.date === todayStr; }

  function fmtDate(dateStr, timeStr) {
    const [,mo,d] = dateStr.split('-');
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return { day: d, rest: months[parseInt(mo)-1] + (timeStr ? ' · ' + timeStr : '') };
  }

  function renderMeetings() {
    const list = document.getElementById('meetingList');
    const filtered = meetFilter === 'todas' ? meetings : meetings.filter(m => m.type === meetFilter);
    const upcoming = filtered.filter(m => !isPast(m));
    const past     = filtered.filter(m => isPast(m));
    document.getElementById('statTotal').textContent = meetings.length;
    document.getElementById('statProx').textContent  = meetings.filter(m => !isPast(m)).length;
    document.getElementById('statToday').textContent = meetings.filter(m => isToday(m)).length;
    if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">Nenhuma reunião encontrada.</div>'; return; }
    list.innerHTML = '';
    upcoming.forEach(m => list.appendChild(mkMeetCard(m, false)));
    if (past.length) {
      const sep = document.createElement('div'); sep.className = 'past-label'; sep.textContent = 'realizadas';
      list.appendChild(sep);
      past.forEach(m => list.appendChild(mkMeetCard(m, true)));
    }
  }

  function mkMeetCard(m, pastFlag) {
    const d = fmtDate(m.date, m.time);
    const div = document.createElement('div');
    div.className = 'meeting-item' + (pastFlag ? ' past' : '');
    div.innerHTML = `
      <div class="meeting-badge ${m.type==='ligacao'?'badge-call':'badge-meet'}">${m.type==='ligacao'?'📞':'🎥'}</div>
      <div class="meeting-info">
        <div class="meeting-name">${m.name}${pastFlag?'<span class="tag-past">passada</span>':''}</div>
        <div class="meeting-meta">${m.phone}${m.email?' · '+m.email:''}${m.obs?' · '+m.obs:''}</div>
        <span class="badge-pill ${m.type==='ligacao'?'pill-ligacao':'pill-meet'}">${m.type==='ligacao'?'Ligação':'Google Meet'}</span>
      </div>
      <div class="meeting-date"><div class="date-day">${d.day}</div><div class="date-rest">${d.rest}</div></div>
      <button class="del-btn" onclick="deleteMeeting(${m.id})">✕</button>`;
    return div;
  }

  /* ---- FECHAMENTOS ---- */
  async function loadDeals() {
    document.getElementById('dealsList').innerHTML = '<div class="loading-state">Carregando...</div>';
    const { data, error } = await sb.from('fechamentos').select('*').order('date', { ascending: false });
    if (error) { showToast('Erro ao carregar fechamentos.', 'error'); console.error(error); return; }
    deals = data || [];
    renderDealsPanel();
    renderDealsList();
  }

  async function saveDeal() {
    const client  = document.getElementById('dClient').value.trim();
    const service = document.getElementById('dService').value;
    const value   = parseFloat(document.getElementById('dValue').value);
    const date    = document.getElementById('dDate').value;
    const obs     = document.getElementById('dObs').value.trim();
    if (!client)        { showToast('Informe o cliente.', 'error'); return; }
    if (!service)       { showToast('Selecione o serviço.', 'error'); return; }
    if (!value || value <= 0) { showToast('Informe o valor.', 'error'); return; }
    if (!date)          { showToast('Informe a data.', 'error'); return; }
    const btn = document.getElementById('btnDeal');
    btn.disabled = true; btn.textContent = 'Salvando...';
    const { error } = await sb.from('fechamentos').insert([{ client, service, value, date, obs: obs||null }]);
    btn.disabled = false; btn.textContent = 'Registrar fechamento';
    if (error) { showToast('Erro ao salvar. Verifique se a tabela "fechamentos" existe.', 'error'); console.error(error); return; }
    ['dClient','dObs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('dService').value = '';
    document.getElementById('dValue').value = '';
    document.getElementById('dDate').value = todayStr;
    showToast('✓ Fechamento registrado!');
    loadDeals();
  }

  async function deleteDeal(id) {
    if (!confirm('Remover este fechamento?')) return;
    const { error } = await sb.from('fechamentos').delete().eq('id', id);
    if (error) { showToast('Erro ao remover.', 'error'); return; }
    deals = deals.filter(d => d.id !== id);
    renderDealsPanel();
    renderDealsList();
  }

  function setPeriod(days, el) {
    currentPeriodDays = days;
    document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderDealsPanel();
  }

  function renderDealsPanel() {
    const filtered = deals.filter(d => dateInPeriod(d.date, currentPeriodDays));
    const total    = filtered.reduce((s, d) => s + Number(d.value), 0);
    const labels   = { 0:'Hoje', 1:'Ontem', 7:'Últimos 7 dias', 30:'Últimos 30 dias', 90:'Últimos 90 dias' };
    document.getElementById('periodLabel').textContent = labels[currentPeriodDays];
    document.getElementById('periodCount').textContent = filtered.length + ' fechamento' + (filtered.length !== 1 ? 's' : '');
    document.getElementById('grandTotal').textContent  = fmtBRL(total);

    // Agrupa por serviço
    const byService = {};
    filtered.forEach(d => {
      if (!byService[d.service]) byService[d.service] = { count: 0, total: 0 };
      byService[d.service].count++;
      byService[d.service].total += Number(d.value);
    });

    const grid = document.getElementById('servicesGrid');
    if (Object.keys(byService).length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--muted);font-size:13px;">Nenhum fechamento neste período.</div>';
      return;
    }
    grid.innerHTML = '';
    Object.entries(byService).sort((a,b) => b[1].total - a[1].total).forEach(([svc, info]) => {
      const card = document.createElement('div');
      card.className = 'service-card';
      card.innerHTML = `
        <div class="service-name">${svc}</div>
        <div class="service-count">${info.count}</div>
        <div class="service-total">${fmtBRL(info.total)}</div>`;
      grid.appendChild(card);
    });
  }

  function renderDealsList() {
    const list = document.getElementById('dealsList');
    if (deals.length === 0) { list.innerHTML = '<div class="empty-state">Nenhum fechamento registrado ainda.</div>'; return; }
    list.innerHTML = '';
    deals.forEach(d => {
      const fd = fmtDate(d.date, null);
      const div = document.createElement('div');
      div.className = 'meeting-item';
      div.innerHTML = `
        <div class="meeting-badge badge-deal">🤝</div>
        <div class="meeting-info">
          <div class="meeting-name">${d.client}</div>
          <div class="meeting-meta">${d.service}${d.obs?' · '+d.obs:''}</div>
          <span class="badge-pill pill-deal">${d.service}</span>
        </div>
        <div class="meeting-date">
          <div class="deal-val">${fmtBRL(d.value)}</div>
          <div class="date-rest">${fd.day} ${fd.rest}</div>
        </div>
        <button class="del-btn" onclick="deleteDeal(${d.id})">✕</button>`;
      list.appendChild(div);
    });
  }

  /* ---- CANVAS BACKGROUND ---- */
  (function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const COLORS = ['#534AB7','#7F77DD','#3C3489','#AFA9EC','#26215C'];
    const orbs = Array.from({length:5}, (_,i) => ({
      x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
      r: 180+Math.random()*220, color: COLORS[i%COLORS.length],
      vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3, phase: Math.random()*Math.PI*2
    }));
    const particles = Array.from({length:60}, () => ({
      x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
      r: 1+Math.random()*2, alpha: .2+Math.random()*.5,
      vx: (Math.random()-.5)*.4, vy: -.2-Math.random()*.5,
      color: COLORS[Math.floor(Math.random()*COLORS.length)]
    }));
    const MAX_DIST = 120;
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='#0f0d2a'; ctx.fillRect(0,0,canvas.width,canvas.height);
      orbs.forEach(o => {
        o.x+=o.vx; o.y+=o.vy; o.phase+=.005;
        const pulse=Math.sin(o.phase)*20;
        if(o.x<-o.r)o.x=canvas.width+o.r; if(o.x>canvas.width+o.r)o.x=-o.r;
        if(o.y<-o.r)o.y=canvas.height+o.r; if(o.y>canvas.height+o.r)o.y=-o.r;
        const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r+pulse);
        g.addColorStop(0,o.color+'22'); g.addColorStop(.5,o.color+'0a'); g.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(o.x,o.y,o.r+pulse,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      });
      particles.forEach(p => {
        p.x+=p.vx; p.y+=p.vy;
        if(p.y<-5){p.y=canvas.height+5;p.x=Math.random()*canvas.width;}
        if(p.x<-5)p.x=canvas.width+5; if(p.x>canvas.width+5)p.x=-5;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0'); ctx.fill();
      });
      ctx.lineWidth=.4;
      for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAX_DIST){
          ctx.strokeStyle=`rgba(127,119,221,${(1-dist/MAX_DIST)*.15})`;
          ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke();
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
