<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLX Mind — Agendamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple-900: #26215C; --purple-800: #3C3489; --purple-600: #534AB7;
      --purple-400: #7F77DD; --purple-200: #AFA9EC; --purple-100: #CECBF6;
      --purple-50: #EEEDFE; --bg: #0f0d2a; --surface: #1a1640;
      --surface2: #231e52; --text: #f0eeff; --muted: #9990cc;
      --border: rgba(175,169,236,0.15);
    }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .app { min-height: 100vh; position: relative; }

    /* HEADER */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 20px; color: var(--purple-100); letter-spacing: -0.5px; }
    .logo span { color: var(--purple-400); }
    .nav { display: flex; gap: 4px; }
    .nav-btn { background: transparent; border: none; padding: 8px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .nav-btn.active { background: var(--purple-800); color: var(--purple-100); }
    .nav-btn:hover:not(.active) { background: rgba(127,119,221,0.12); color: var(--text); }

    /* CONTENT */
    .content { padding: 32px 24px; max-width: 680px; margin: 0 auto; }

    .form-section { display: none; }
    .list-section { display: none; }
    .form-section.active { display: block; }
    .list-section.active { display: block; }

    .section-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 600; color: var(--purple-100); margin-bottom: 6px; }
    .section-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

    /* FORM CARD */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--purple-400); }
    .form-input::placeholder { color: var(--muted); }

    .type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .type-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .type-card:hover { border-color: var(--purple-400); background: rgba(127,119,221,0.08); }
    .type-card.selected { border-color: var(--purple-400); background: rgba(127,119,221,0.15); }
    .type-icon { font-size: 26px; margin-bottom: 8px; display: block; }
    .type-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .type-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .btn-primary { width: 100%; background: var(--purple-600); border: none; border-radius: 10px; padding: 13px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: white; cursor: pointer; margin-top: 8px; transition: background 0.2s; letter-spacing: 0.3px; }
    .btn-primary:hover { background: var(--purple-800); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 700; color: var(--purple-400); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* LIST */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .filter-row { display: flex; gap: 6px; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .filter-btn.active { background: var(--purple-800); border-color: var(--purple-600); color: var(--purple-100); }

    .meeting-list { display: flex; flex-direction: column; gap: 10px; }
    .meeting-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .meeting-item.past { opacity: 0.4; border-style: dashed; }

    .meeting-badge { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .badge-call { background: rgba(127,119,221,0.2); }
    .badge-meet { background: rgba(29,158,117,0.2); }

    .meeting-info { flex: 1; min-width: 0; }
    .meeting-name { font-weight: 500; font-size: 14px; color: var(--text); }
    .meeting-meta { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meeting-type { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; display: inline-block; margin-top: 5px; }
    .type-ligacao { background: rgba(127,119,221,0.15); color: var(--purple-200); }
    .type-meet { background: rgba(29,158,117,0.15); color: #5DCAA5; }

    .meeting-date { text-align: right; flex-shrink: 0; }
    .date-day { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--purple-400); line-height: 1; }
    .date-rest { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .del-btn { background: transparent; border: none; width: 28px; height: 28px; border-radius: 6px; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
    .del-btn:hover { background: rgba(226,75,74,0.15); color: #E24B4A; }

    .past-label { font-size: 11px; color: var(--muted); font-style: italic; padding: 6px 0; border-top: 1px solid var(--border); text-align: center; margin-top: 6px; }
    .tag-past { font-size: 10px; padding: 2px 8px; background: rgba(136,135,128,0.2); color: var(--muted); border-radius: 20px; margin-left: 6px; }

    .empty-state { text-align: center; padding: 56px 24px; color: var(--muted); font-size: 14px; line-height: 1.8; }

    /* TOAST */
    .toast { position: fixed; top: 20px; right: 20px; background: var(--purple-800); color: var(--purple-100); padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; display: none; z-index: 200; border: 1px solid var(--purple-600); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

    @media (max-width: 480px) {
      .content { padding: 20px 16px; }
      .row2 { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3,1fr); }
      .stat-val { font-size: 22px; }
      .header { padding: 14px 16px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="toast" id="toast">✓ Reunião agendada com sucesso!</div>

  <div class="header">
    <div class="logo">MLX <span>MIND</span></div>
    <div class="nav">
      <button class="nav-btn active" onclick="setView('form')">Agendar</button>
      <button class="nav-btn" onclick="setView('list')">Reuniões</button>
    </div>
  </div>

  <div class="content">

    <!-- FORMULÁRIO -->
    <div class="form-section active" id="formView">
      <div class="section-title">Nova reunião</div>
      <div class="section-sub">Preencha os dados abaixo para agendar</div>
      <div class="form-card">
        <div class="form-group">
          <label class="form-label">Tipo de reunião</label>
          <div class="type-row">
            <div class="type-card selected" id="tc-ligacao" onclick="selectType('ligacao')">
              <span class="type-icon">📞</span>
              <div class="type-name">Ligação</div>
              <div class="type-desc">Chamada por telefone</div>
            </div>
            <div class="type-card" id="tc-meet" onclick="selectType('meet')">
              <span class="type-icon">🎥</span>
              <div class="type-name">Google Meet</div>
              <div class="type-desc">Reunião por vídeo</div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Nome do cliente / contato *</label>
          <input class="form-input" id="fName" type="text" placeholder="Ex: João Silva">
        </div>

        <div class="row2">
          <div class="form-group">
            <label class="form-label">Telefone *</label>
            <input class="form-input" id="fPhone" type="tel" placeholder="(11) 99999-9999">
          </div>
          <div class="form-group">
            <label class="form-label">E-mail (opcional)</label>
            <input class="form-input" id="fEmail" type="email" placeholder="email@exemplo.com">
          </div>
        </div>

        <div class="row2">
          <div class="form-group">
            <label class="form-label">Data *</label>
            <input class="form-input" id="fDate" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Horário *</label>
            <input class="form-input" id="fTime" type="time">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Observações (opcional)</label>
          <input class="form-input" id="fObs" type="text" placeholder="Ex: Apresentar proposta de tráfego pago">
        </div>

        <button class="btn-primary" onclick="saveMeeting()">Confirmar agendamento</button>
      </div>
    </div>

    <!-- LISTA -->
    <div class="list-section" id="listView">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val" id="statTotal">0</div>
          <div class="stat-label">Total agendado</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statProx">0</div>
          <div class="stat-label">Próximas</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statToday">0</div>
          <div class="stat-label">Hoje</div>
        </div>
      </div>

      <div class="section-header">
        <div class="section-title" style="margin-bottom:0;">Agenda</div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('todas',this)">Todas</button>
          <button class="filter-btn" onclick="setFilter('ligacao',this)">Ligação</button>
          <button class="filter-btn" onclick="setFilter('meet',this)">Meet</button>
        </div>
      </div>

      <div class="meeting-list" id="meetingList">
        <div class="empty-state">Nenhuma reunião agendada ainda.<br>Use a aba "Agendar" para criar a primeira.</div>
      </div>
    </div>

  </div>
</div>

<script>
  const STORAGE_KEY = 'mlx_meetings';
  let meetings = [];
  let selectedType = 'ligacao';
  let currentFilter = 'todas';

  const todayStr = new Date().toISOString().split('T')[0];
  document.getElementById('fDate').value = todayStr;
  document.getElementById('fDate').min = todayStr;
  document.getElementById('fTime').value = '09:00';

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      meetings = raw ? JSON.parse(raw) : [];
    } catch(e) { meetings = []; }
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(meetings)); } catch(e) {}
  }

  function setView(v) {
    document.getElementById('formView').classList.toggle('active', v === 'form');
    document.getElementById('listView').classList.toggle('active', v === 'list');
    document.querySelectorAll('.nav-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && v === 'form') || (i === 1 && v === 'list'));
    });
    if (v === 'list') renderList();
  }

  function selectType(t) {
    selectedType = t;
    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('tc-' + t).classList.add('selected');
  }

  function saveMeeting() {
    const name  = document.getElementById('fName').value.trim();
    const phone = document.getElementById('fPhone').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    const date  = document.getElementById('fDate').value;
    const time  = document.getElementById('fTime').value;
    const obs   = document.getElementById('fObs').value.trim();

    if (!name)        { alert('Informe o nome do contato.'); return; }
    if (!phone)       { alert('Informe o telefone.'); return; }
    if (!date || !time) { alert('Informe data e horário.'); return; }

    meetings.push({ id: Date.now(), type: selectedType, name, phone, email, date, time, obs });
    meetings.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
    persist();

    document.getElementById('fName').value  = '';
    document.getElementById('fPhone').value = '';
    document.getElementById('fEmail').value = '';
    document.getElementById('fObs').value   = '';
    document.getElementById('fDate').value  = todayStr;
    document.getElementById('fTime').value  = '09:00';

    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);

    setView('list');
  }

  function deleteMeeting(id) {
    if (!confirm('Remover esta reunião?')) return;
    meetings = meetings.filter(m => m.id !== id);
    persist();
    renderList();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function isPast(m) { return new Date(m.date + 'T' + m.time) < new Date(); }
  function isToday(m) { return m.date === todayStr; }

  function formatDate(dateStr, timeStr) {
    const [y, mo, d] = dateStr.split('-');
    const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return { day: d, rest: months[parseInt(mo) - 1] + ' · ' + timeStr };
  }

  function renderList() {
    const list = document.getElementById('meetingList');
    const filtered = currentFilter === 'todas' ? meetings : meetings.filter(m => m.type === currentFilter);
    const upcoming = filtered.filter(m => !isPast(m));
    const past     = filtered.filter(m => isPast(m));

    document.getElementById('statTotal').textContent = meetings.length;
    document.getElementById('statProx').textContent  = meetings.filter(m => !isPast(m)).length;
    document.getElementById('statToday').textContent = meetings.filter(m => isToday(m)).length;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">Nenhuma reunião encontrada.<br>Use a aba "Agendar" para criar a primeira.</div>';
      return;
    }

    list.innerHTML = '';
    upcoming.forEach(m => list.appendChild(createCard(m, false)));

    if (past.length > 0) {
      const div = document.createElement('div');
      div.className = 'past-label';
      div.textContent = 'realizadas';
      list.appendChild(div);
      past.forEach(m => list.appendChild(createCard(m, true)));
    }
  }

  function createCard(m, pastFlag) {
    const d   = formatDate(m.date, m.time);
    const div = document.createElement('div');
    div.className = 'meeting-item' + (pastFlag ? ' past' : '');
    div.innerHTML = `
      <div class="meeting-badge ${m.type === 'ligacao' ? 'badge-call' : 'badge-meet'}">
        ${m.type === 'ligacao' ? '📞' : '🎥'}
      </div>
      <div class="meeting-info">
        <div class="meeting-name">${m.name}${pastFlag ? '<span class="tag-past">passada</span>' : ''}</div>
        <div class="meeting-meta">${m.phone}${m.email ? ' · ' + m.email : ''}${m.obs ? ' · ' + m.obs : ''}</div>
        <span class="meeting-type ${m.type === 'ligacao' ? 'type-ligacao' : 'type-meet'}">
          ${m.type === 'ligacao' ? 'Ligação' : 'Google Meet'}
        </span>
      </div>
      <div class="meeting-date">
        <div class="date-day">${d.day}</div>
        <div class="date-rest">${d.rest}</div>
      </div>
      <button class="del-btn" onclick="deleteMeeting(${m.id})" title="Remover">✕</button>
    `;
    return div;
  }

  load();
  renderList();
</script>
</body>
</html>
